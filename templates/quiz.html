<!DOCTYPE html>
<html>

<head>

 <title>StudyShield AI</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center mb-4">
📝 AI Quiz
</h2>

<form action="/result" method="POST" onsubmit="showQuizLoading()">

{% for q in questions %}

{% set q_no = loop.index %}

<div class="mb-4">

<h5>
Q{{ q_no }}. {{ q.question }}
</h5>

{% for option in q.options %}

<div class="form-check">

<input
class="form-check-input"
type="radio"
name="q{{ q_no }}"
value="{{ option }}"
required>

<label class="form-check-label">
{{ option }}
</label>

</div>

{% endfor %}

<input
type="hidden"
name="correct{{ q_no }}"
value="{{ q.answer }}">

</div>

<hr>

{% endfor %}

<button class="btn btn-success w-100">

Submit Quiz

</button>

</form>

</div>

</div>
<div id="quizLoading" style="display:none;" class="text-center mt-4">

<div class="spinner-border text-success"></div>

<h4 class="mt-3">

Checking Answers...

</h4>

</div>

<script>

function showQuizLoading(){

document.getElementById("quizLoading").style.display="block";

}

</script>
<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 StudyShield AI | Developed by Monish K
</footer>
</body>

</html>
