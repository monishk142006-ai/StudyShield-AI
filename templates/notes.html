
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyShield AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>








<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">📘 StudyShield AI</a>

        <div>
            <a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
            <a href="/history" class="btn btn-warning btn-sm">History</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow-lg p-4">

        <h2 class="text-center mb-4">
            📚 AI Study Notes
        </h2>

        <form method="POST" enctype="multipart/form-data" onsubmit="showLoading()">

            <div class="mb-3">
                <label class="form-label">
    Upload Study File (PDF / JPG / JPEG / PNG)
</label>

<input
    type="file"
    name="pdf"
    class="form-control"
    accept=".pdf,.jpg,.jpeg,.png"
    required>
            </div>

          <button class="btn btn-primary w-100">
    🤖 Generate AI Summary & Quiz
</button>

        </form>

        {% if summary %}

        <hr>

        <h3 class="text-success">
            AI Summary
        </h3>

        <div class="alert alert-success" style="white-space: pre-wrap;">
            {{ summary }}
        </div>

        <div class="text-center mt-4">

            <a href="/quiz" class="btn btn-success btn-lg">
                📝 Generate AI Quiz
            </a>

        </div>

        {% endif %}

    </div>

</div>
<div id="loading" style="display:none;" class="text-center mt-4">

    <div class="spinner-border text-primary" role="status"></div>

    <h4 class="mt-3">
        🤖 AI is generating summary...
    </h4>

</div>

<script>

function showLoading(){

    document.getElementById("loading").style.display="block";

}

</script>

</body>
</html>
