<!DOCTYPE html>
<html>

<head>
<title>StudyShield AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">
📄 Uploaded Notes History
</h2>

<table class="table table-bordered table-striped">

<tr>

<th>File Name</th>
<th>Type</th>
<th>Uploaded On</th>

</tr>

{% for note in notes %}

<tr>

<td>{{ note[0] }}</td>
<td>{{ note[1] }}</td>
<td>{{ note[2] }}</td>

</tr>

{% endfor %}

</table>

<a href="/dashboard" class="btn btn-primary">

Back to Dashboard

</a>

</div>
<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 StudyShield AI | Developed by Monish K
</footer>

</body>

</html>
