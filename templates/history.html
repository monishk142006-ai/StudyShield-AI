<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudyShield AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="/dashboard">StudyShield AI</a>

    <div>
        <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-5">

    <h2 class="mb-4">📜 AI Chat History</h2>

    {% if chats %}

        {% for chat in chats %}

        <div class="card shadow mb-3">

            <div class="card-body">

                <h6 class="text-primary">Question</h6>
                <p>{{ chat[0] }}</p>

                <h6 class="text-success">Answer</h6>
                <p>{{ chat[1] }}</p>

                <small class="text-muted">
                    {{ chat[2] }}
                </small>

            </div>

        </div>

        {% endfor %}

    {% else %}

        <div class="alert alert-info">
            No chat history available.
        </div>

    {% endif %}

</div>
<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 StudyShield AI | Developed by Monish K
</footer>
</body>
</html>
